name: Trigger Portfolio Sync

# On every push to main, ping the portfolio repo so its sync-resume
# workflow runs immediately instead of waiting for the next cron.
#
# Requires a repo secret named PORTFOLIO_DISPATCH_TOKEN holding a fine-
# grained or classic PAT with the "contents: read" and "actions: write"
# permissions on the smallchungus/PortfolioWebsite repo.
#
# Create one at github.com/settings/tokens (classic) or
# github.com/settings/personal-access-tokens (fine-grained), then add it
# under this repo's Settings → Secrets and variables → Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to portfolio repo
        env:
          TOKEN: ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "PORTFOLIO_DISPATCH_TOKEN not set; skipping. Add it at Settings → Secrets to enable push-triggered sync."
            exit 0
          fi
          status=$(curl -sS -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/smallchungus/PortfolioWebsite/dispatches \
            -d '{"event_type":"resume-updated"}')
          echo "Dispatch response HTTP $status"
          cat /tmp/response.json || true
          if [ "$status" != "204" ]; then
            echo "Dispatch failed."
            exit 1
          fi
          echo "Portfolio sync dispatched."
